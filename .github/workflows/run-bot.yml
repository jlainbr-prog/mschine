name: Run Flash Arb Bot

on:
  schedule:
    # every 5 minutes (GitHub Actions minimum granularity)
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci

      - name: Run Flash Arb Bot
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RPC_ETH: ${{ secrets.RPC_ETH }}
          RPC_BSC: ${{ secrets.RPC_BSC }}
          RECEIVER_ETH: ${{ secrets.RECEIVER_ETH }}
          RECEIVER_BSC: ${{ secrets.RECEIVER_BSC }}
          CONTRACTS: ${{ secrets.CONTRACTS }}
          TOKEN_B: ${{ secrets.TOKEN_B }}
          AMOUNT_A: ${{ secrets.AMOUNT_A }}
          AMOUNT_B: ${{ secrets.AMOUNT_B }}
          ROUTER: ${{ secrets.ROUTER }}
          MIN_PROFIT_USD: ${{ secrets.MIN_PROFIT_USD }}
          SLIPPAGE: ${{ secrets.SLIPPAGE }}
          GAS_MULTIPLIER: ${{ secrets.GAS_MULTIPLIER }}
          SINGLE_CYCLE: '1'
        run: |
          node scripts/multi-flash-arbbot.js
